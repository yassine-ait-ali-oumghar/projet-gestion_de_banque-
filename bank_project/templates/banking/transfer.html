{% extends 'base.html' %}
{% block title %}Virement | NovaBank{% endblock %}
{% block content %}
<div class="dashboard-page page-wrapper">
    <div class="container py-5">
        <h2 class="fw-bold text-white mb-4"><i class="bi bi-arrow-left-right me-2" style="color:var(--nova-sapphire);"></i>Effectuer un Virement</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card nova-card p-4">
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="sender" class="form-label text-secondary">Compte Émetteur</label>
                                <select name="sender" id="sender" class="form-select nova-input" required>
                                    {% for acc in accounts %}
                                    <option value="{{ acc.id }}">{{ acc.account_number }} — {{ acc.balance|floatformat:2 }} MAD</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="receiver" class="form-label text-secondary">N° Compte Destinataire</label>
                                <input type="text" name="receiver" id="receiver" class="form-control nova-input" placeholder="Ex: NB1234567890" required>
                            </div>
                            <div class="mb-4">
                                <label for="amount" class="form-label text-secondary">Montant (MAD)</label>
                                <input type="number" step="0.01" min="0.01" name="amount" id="amount" class="form-control nova-input" placeholder="0.00" required>
                            </div>
                            <button type="submit" class="btn w-100 rounded-pill py-2 fw-bold" style="background:var(--nova-sapphire);color:#000;">
                                <i class="bi bi-send me-2"></i>Effectuer le Virement
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
