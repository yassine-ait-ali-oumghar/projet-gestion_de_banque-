{% extends 'base.html' %}
{% block title %}Dépôt | NovaBank{% endblock %}
{% block content %}
<div class="dashboard-page page-wrapper">
    <div class="container py-5">
        <h2 class="fw-bold text-white mb-4"><i class="bi bi-plus-circle me-2" style="color:var(--nova-emerald);"></i>Effectuer un Dépôt</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card nova-card p-4">
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="account" class="form-label text-secondary">Compte</label>
                                <select name="account" id="account" class="form-select nova-input" required>
                                    {% for acc in accounts %}
                                    <option value="{{ acc.id }}">{{ acc.account_number }} — {{ acc.balance|floatformat:2 }} MAD</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-4">
                                <label for="amount" class="form-label text-secondary">Montant (MAD)</label>
                                <input type="number" step="0.01" min="100" max="50000" name="amount" id="amount" class="form-control nova-input" placeholder="0.00" required>
                                <div class="form-text" style="color:#888; font-size:0.82rem;">
                                    <i class="bi bi-info-circle me-1"></i>Min : <strong>100 MAD</strong> — Max : <strong>50 000 MAD</strong> par opération.
                                </div>
                            </div>
                            <button type="submit" class="btn w-100 rounded-pill py-2 fw-bold" style="background:var(--nova-emerald);color:#000;">
                                <i class="bi bi-check-circle me-2"></i>Déposer
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
