{% extends 'base.html' %}
{% block title %}Paiement Carte | NovaBank{% endblock %}
{% block content %}
<div class="dashboard-page page-wrapper">
    <div class="container py-5">
        <h2 class="fw-bold text-white mb-4"><i class="bi bi-bag-check me-2 text-gold"></i>Paiement par Carte Bancaire</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card nova-card p-4">
                    <div class="card-body">
                        <form method="post" id="paymentForm">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="card" class="form-label text-secondary">Carte Bancaire</label>
                                <select name="card" id="card" class="form-select nova-input" required>
                                    {% for card in cards %}
                                    <option value="{{ card.id }}" data-balance="{{ card.account.balance }}" data-plafond="{{ card.plafond }}" data-spent="{{ card.daily_spent }}">
                                        •••• {{ card.card_number|slice:"-4:" }} - {{ card.account.account_number }}
                                        (Plafond: {{ card.plafond|floatformat:0 }} MAD)
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="amount" class="form-label text-secondary">Montant (MAD)</label>
                                <input type="number" step="0.01" min="0.01" name="amount" id="amount" class="form-control nova-input" placeholder="0.00" required>
                                <div id="amountError" class="text-danger small mt-1" style="display:none;"></div>
                            </div>
                            <div class="mb-4">
                                <label for="description" class="form-label text-secondary">Description (optionnelle)</label>
                                <input type="text" name="description" id="description" class="form-control nova-input" placeholder="Ex: Achat en ligne">
                            </div>
                            <button type="button" id="payBtn" class="btn btn-warning w-100 rounded-pill py-2 fw-bold">
                                <i class="bi bi-credit-card me-2"></i>Effectuer le Paiement
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Confirmation Modal -->
<div id="confirmOverlay" style="display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:16px; padding:2.5rem 2rem; max-width:420px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center;">
        <div style="width:64px; height:64px; border-radius:50%; background:#fefce8; display:flex; align-items:center; justify-content:center; margin:0 auto 1.2rem;">
            <i class="bi bi-credit-card-fill" style="font-size:2rem; color:#f59e0b;"></i>
        </div>
        <h5 style="font-weight:700; color:#1a1a1a; margin-bottom:0.5rem;">Confirmer le paiement</h5>
        <p style="color:#666; font-size:0.95rem;" id="confirmText"></p>
        <div style="display:flex; gap:0.75rem; justify-content:center; margin-top:1.5rem;">
            <button type="button" id="cancelBtn" style="padding:0.5rem 1.5rem; border-radius:50px; border:1px solid #ccc; background:#fff; color:#333; font-weight:600; cursor:pointer;">
                <i class="bi bi-x-lg me-1"></i>Annuler
            </button>
            <button type="button" id="confirmBtn" style="padding:0.5rem 1.5rem; border-radius:50px; border:none; background:#f59e0b; color:#fff; font-weight:600; cursor:pointer;">
                <i class="bi bi-check-lg me-1"></i>Confirmer
            </button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('paymentForm');
    const amountInput = document.getElementById('amount');
    const amountError = document.getElementById('amountError');
    const payBtn = document.getElementById('payBtn');
    const overlay = document.getElementById('confirmOverlay');
    const confirmText = document.getElementById('confirmText');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');

    amountInput.addEventListener('input', function() {
        const val = parseFloat(this.value);
        const sel = document.getElementById('card').selectedOptions[0];
        const balance = parseFloat(sel.dataset.balance);
        const plafond = parseFloat(sel.dataset.plafond);
        const spent = parseFloat(sel.dataset.spent);
        const remaining = plafond - spent;

        if (isNaN(val) || val <= 0) {
            amountError.textContent = 'Le montant doit être supérieur à 0.';
            amountError.style.display = 'block';
        } else if (val > remaining) {
            amountError.textContent = 'Limite quotidienne dépassée (restant: ' + remaining.toFixed(2) + ' MAD).';
            amountError.style.display = 'block';
        } else if (val > balance) {
            amountError.textContent = 'Solde insuffisant sur le compte lié (' + balance.toFixed(2) + ' MAD).';
            amountError.style.display = 'block';
        } else {
            amountError.style.display = 'none';
        }
    });

    payBtn.addEventListener('click', function() {
        const val = parseFloat(amountInput.value);
        if (!form.checkValidity() || isNaN(val) || val <= 0) {
            form.reportValidity();
            return;
        }
        const cardText = document.getElementById('card').selectedOptions[0].text;
        const desc = document.getElementById('description').value || 'Paiement';
        confirmText.innerHTML = 'Vous êtes sur le point de payer <strong>' + val.toFixed(2) + ' MAD</strong> avec la carte <strong>' + cardText.split(' - ')[0].trim() + '</strong> — ' + desc + '.';
        overlay.style.display = 'flex';
    });

    cancelBtn.addEventListener('click', function() { overlay.style.display = 'none'; });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.style.display = 'none'; });
    confirmBtn.addEventListener('click', function() { form.submit(); });
});
</script>
{% endblock %}
